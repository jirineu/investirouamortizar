<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Simulador Patrimonial Inteligente</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f1117;
    color:#fff;
    font-family:Arial, Helvetica, sans-serif;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

h1{
    font-size:32px;
    margin-bottom:25px;
    font-weight:700;
}

.card{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(10px);
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
}

.input-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    color:#cfcfcf;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#1b1f2a;
    color:#fff;
    font-size:15px;
    outline:none;
    transition:0.2s;
}

input:focus{
    background:#232938;
    transform:scale(1.01);
}

button{
    width:100%;
    margin-top:25px;
    padding:18px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#4f8cff,#7a5cff);
    color:#fff;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
}

.resultado{
    margin-top:25px;
}

.resultado-card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.08);
}

.resultado-card h2{
    margin-bottom:20px;
    font-size:24px;
}

.linha{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
    gap:20px;
}

.linha span{
    color:#bdbdbd;
}

.linha strong{
    font-size:18px;
}

hr{
    border:none;
    border-top:1px solid rgba(255,255,255,0.08);
    margin:25px 0;
}

.melhor{
    margin-top:25px;
    padding:22px;
    border-radius:18px;
    background:linear-gradient(135deg,#1c2333,#222b40);
    border:1px solid rgba(255,255,255,0.08);
}

.melhor h3{
    margin-bottom:10px;
    font-size:22px;
}

.info{
    margin-top:12px;
    color:#a9b1c7;
    line-height:1.6;
}

@media(max-width:700px){

    body{
        padding:15px;
    }

    h1{
        font-size:26px;
    }

}

</style>
</head>
<body>

<div class="container">

    <h1>Simulador Patrimonial Inteligente</h1>

    <div class="card">

        <div class="grid">

            <div class="input-group">
                <label>Valor do imóvel</label>
                <input type="number" id="valorImovel" placeholder="350000">
            </div>

            <div class="input-group">
                <label>Saldo devedor atual</label>
                <input type="number" id="saldoDevedor" placeholder="190000">
            </div>

            <div class="input-group">
                <label>Valor da parcela mensal</label>
                <input type="number" id="parcelaMensal" placeholder="1159">
            </div>

            <div class="input-group">
                <label>Taxa do financiamento (% ao ano)</label>
                <input type="number" id="jurosFinanciamento" placeholder="6.5">
            </div>

            <div class="input-group">
                <label>Valor mensal para investir/amortizar</label>
                <input type="number" id="aporteMensal" placeholder="2000">
            </div>

            <div class="input-group">
                <label>Rentabilidade investimento (% ao ano)</label>
                <input type="number" id="rentabilidade" placeholder="12">
            </div>

            <div class="input-group">
                <label>Inflação anual (%)</label>
                <input type="number" id="inflacao" value="6">
            </div>

            <div class="input-group">
                <label>Valorização anual do imóvel (%)</label>
                <input type="number" id="valorizacao" placeholder="6">
            </div>

            <div class="input-group">
                <label>Tempo da simulação (anos)</label>
                <input type="number" id="anos" placeholder="3">
            </div>

        </div>

        <button onclick="calcular()">
            Calcular Simulação
        </button>

    </div>

    <div id="resultado" class="resultado"></div>

</div>

<script>

// =========================
// LOCAL STORAGE
// =========================

const campos = document.querySelectorAll('input');

campos.forEach(campo => {

    const salvo = localStorage.getItem(campo.id);

    if(salvo !== null){
        campo.value = salvo;
    }

    campo.addEventListener('input', () => {
        localStorage.setItem(campo.id, campo.value);
    });

});

// =========================
// FORMATAR MOEDA
// =========================

function moeda(valor){

    return valor.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });

}

// =========================
// CALCULAR
// =========================

function calcular(){

    const valorImovel =
        parseFloat(document.getElementById('valorImovel').value) || 0;

    const saldoDevedor =
        parseFloat(document.getElementById('saldoDevedor').value) || 0;

    const parcelaMensal =
        parseFloat(document.getElementById('parcelaMensal').value) || 0;

    const jurosFinanciamento =
        parseFloat(document.getElementById('jurosFinanciamento').value) || 0;

    const aporteMensal =
        parseFloat(document.getElementById('aporteMensal').value) || 0;

    const rentabilidade =
        parseFloat(document.getElementById('rentabilidade').value) || 0;

    const inflacao =
        parseFloat(document.getElementById('inflacao').value) || 0;

    const valorizacao =
        parseFloat(document.getElementById('valorizacao').value) || 0;

    const anos =
        parseFloat(document.getElementById('anos').value) || 0;

    const meses = anos * 12;

    // =========================
    // TAXAS MENSAIS
    // =========================

    const taxaFinanciamento =
        Math.pow(1 + jurosFinanciamento/100, 1/12) - 1;

    const taxaInvestimento =
        Math.pow(1 + rentabilidade/100, 1/12) - 1;

    const taxaValorizacao =
        Math.pow(1 + valorizacao/100, 1/12) - 1;

    // =========================
    // CENÁRIO INVESTINDO
    // =========================

    let investimento = 0;
    let totalInvestido = 0;

    for(let i=0; i<meses; i++){

        investimento =
            (investimento + aporteMensal) *
            (1 + taxaInvestimento);

        totalInvestido += aporteMensal;
    }

    const jurosGanhos =
        investimento - totalInvestido;

    // =========================
    // FINANCIAMENTO NORMAL
    // =========================

    let saldoNormal = saldoDevedor;

    let jurosPagosNormal = 0;

    for(let i=0; i<meses; i++){

        if(saldoNormal <= 0) break;

        const jurosMes =
            saldoNormal * taxaFinanciamento;

        jurosPagosNormal += jurosMes;

        const amortizacao =
            parcelaMensal - jurosMes;

        saldoNormal -= amortizacao;

    }

    // =========================
    // FINANCIAMENTO AMORTIZANDO
    // =========================

    let saldoAmortizando = saldoDevedor;

    let jurosPagosAmortizando = 0;

    let totalPago = 0;

    let mesesQuitacao = 0;

    for(let i=0; i<420; i++){

        if(saldoAmortizando <= 0) break;

        const jurosMes =
            saldoAmortizando * taxaFinanciamento;

        jurosPagosAmortizando += jurosMes;

        const pagamento =
            parcelaMensal + aporteMensal;

        const amortizacao =
            pagamento - jurosMes;

        saldoAmortizando -= amortizacao;

        totalPago += pagamento;

        mesesQuitacao++;

        if(saldoAmortizando <= 0){

            saldoAmortizando = 0;

            break;
        }

    }

    // =========================
    // VALOR FUTURO IMÓVEL
    // =========================

    const valorFuturoImovel =
        valorImovel *
        Math.pow(1 + taxaValorizacao, meses);

    // =========================
    // ECONOMIA JUROS
    // =========================

    const economiaJuros =
        jurosPagosNormal - jurosPagosAmortizando;

    // =========================
    // QUAL MELHOR?
    // =========================

    let melhor = '';

    if(jurosGanhos > economiaJuros){

        melhor = `
        Investir tende a gerar maior patrimônio financeiro no período analisado.
        `;

    } else {

        melhor = `
        Amortizar tende a gerar maior economia financeira e redução de risco.
        `;
    }

    // =========================
    // RESULTADO
    // =========================

    document.getElementById('resultado').innerHTML = `

    <div class="resultado-card">

        <h2>Resultado da Simulação</h2>

        <div class="linha">
            <span>Total investido</span>
            <strong>${moeda(totalInvestido)}</strong>
        </div>

        <div class="linha">
            <span>Valor acumulado investindo</span>
            <strong>${moeda(investimento)}</strong>
        </div>

        <div class="linha">
            <span>Juros compostos ganhos</span>
            <strong>${moeda(jurosGanhos)}</strong>
        </div>

        <hr>

        <div class="linha">
            <span>Saldo restante da dívida após ${anos} anos</span>
            <strong>${moeda(saldoNormal)}</strong>
        </div>

        <div class="linha">
            <span>Juros pagos ao banco</span>
            <strong>${moeda(jurosPagosNormal)}</strong>
        </div>

        <div class="linha">
            <span>Saldo quitado amortizando</span>
            <strong>${moeda(saldoDevedor - saldoAmortizando)}</strong>
        </div>

        <div class="linha">
            <span>Economia estimada de juros</span>
            <strong>${moeda(economiaJuros)}</strong>
        </div>

        <div class="linha">
            <span>Prazo estimado para quitar amortizando</span>
            <strong>${Math.floor(mesesQuitacao/12)} anos e ${mesesQuitacao%12} meses</strong>
        </div>

        <hr>

        <div class="linha">
            <span>Valor estimado do imóvel em ${anos} anos</span>
            <strong>${moeda(valorFuturoImovel)}</strong>
        </div>

        <hr>

        <div class="melhor">

            <h3>Melhor Estratégia</h3>

            <div class="info">
                ${melhor}
            </div>

            <div class="info" style="margin-top:20px;">

                <strong>Investindo:</strong><br>
                Você acumularia patrimônio financeiro enquanto mantém maior liquidez.

            </div>

            <div class="info">

                <strong>Amortizando:</strong><br>
                Você reduz drasticamente juros futuros e acelera a quitação do imóvel.

            </div>

        </div>

    </div>

    `;

    localStorage.setItem(
        'resultadoHTML',
        document.getElementById('resultado').innerHTML
    );

}

// =========================
// RECUPERAR RESULTADO
// =========================

const resultadoSalvo =
    localStorage.getItem('resultadoHTML');

if(resultadoSalvo){

    document.getElementById('resultado').innerHTML =
        resultadoSalvo;

}

</script>

</body>
</html>
