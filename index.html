<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simulador Patrimonial Inteligente</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f172a;
    font-family:Inter,Arial,sans-serif;
    color:white;
    min-height:100vh;
    padding:30px;
}

.container{
    max-width:1200px;
    margin:auto;
}

.title{
    font-size:32px;
    font-weight:700;
    margin-bottom:8px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(12px);
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-3px);
}

label{
    display:block;
    font-size:13px;
    margin-bottom:8px;
    color:#cbd5e1;
}

input,select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:#111827;
    color:white;
    font-size:15px;
    outline:none;
}

input::placeholder{
    color:#64748b;
}

button{
    width:100%;
    border:none;
    padding:18px;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    opacity:0.9;
    transform:scale(1.01);
}

.results{
    margin-top:30px;
    display:none;
}

.result-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:20px;
}

.result-card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    border:1px solid rgba(255,255,255,0.08);
}

.result-card h3{
    margin-bottom:18px;
    font-size:20px;
}

.result-item{
    margin-bottom:14px;
}

.result-item span{
    display:block;
    color:#94a3b8;
    font-size:13px;
    margin-bottom:4px;
}

.result-item strong{
    font-size:22px;
}

.best{
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    background:linear-gradient(135deg,#059669,#10b981);
    color:white;
    text-align:center;
    animation:fade 0.5s ease;
}

.best h2{
    margin-bottom:10px;
}

.analysis{
    margin-top:20px;
    line-height:1.7;
    color:#cbd5e1;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:700px){
    body{
        padding:18px;
    }

    .title{
        font-size:25px;
    }
}
</style>
</head>
<body>

<div class="container">

    <div class="title">
        Simulador Patrimonial Inteligente
    </div>

    <div class="subtitle">
        Compare investir ou amortizar seu financiamento imobiliário.
    </div>

    <div class="grid">

        <div class="card">
            <label>Valor atual do imóvel</label>
            <input type="number" id="valorImovel" placeholder="Ex: 500000">
        </div>

        <div class="card">
            <label>Saldo devedor atual</label>
            <input type="number" id="saldoDevedor" placeholder="Ex: 320000">
        </div>

        <div class="card">
            <label>Parcelas restantes</label>
            <input type="number" id="parcelas" placeholder="Ex: 360">
        </div>

        <div class="card">
            <label>Valor da parcela mensal</label>
            <input type="number" id="parcela" placeholder="Ex: 2800">
        </div>

        <div class="card">
            <label>Taxa do financiamento (% ao ano)</label>
            <input type="number" id="jurosFinanciamento" placeholder="Ex: 10">
        </div>

        <div class="card">
            <label>Valor mensal disponível</label>
            <input type="number" id="aporte" placeholder="Ex: 2000">
        </div>

        <div class="card">
            <label>Rentabilidade do investimento (% ao ano)</label>
            <input type="number" id="rentabilidade" placeholder="Ex: 12">
        </div>

        <div class="card">
            <label>Valorização do imóvel (% ao ano)</label>
            <input type="number" id="valorizacao" placeholder="Ex: 7">
        </div>

        <div class="card">
            <label>Tempo da simulação (anos)</label>
            <input type="number" id="anos" placeholder="Ex: 7">
        </div>

        <div class="card">
            <label>Sistema</label>
            <select id="sistema">
                <option value="PRICE">PRICE</option>
                <option value="SAC">SAC</option>
            </select>
        </div>

    </div>

    <div style="margin-top:25px;">
        <button onclick="simular()">
            Simular Estratégias
        </button>
    </div>

    <div class="results" id="results">

        <div class="result-grid">

            <div class="result-card">
                <h3>📈 Investindo</h3>

                <div class="result-item">
                    <span>Total investido</span>
                    <strong id="totalInvestido"></strong>
                </div>

                <div class="result-item">
                    <span>Juros compostos ganhos</span>
                    <strong id="jurosGanhos"></strong>
                </div>

                <div class="result-item">
                    <span>Patrimônio investido final</span>
                    <strong id="patrimonioInvestido"></strong>
                </div>

                <div class="result-item">
                    <span>Valor futuro do imóvel</span>
                    <strong id="imovelInvestindo"></strong>
                </div>

            </div>

            <div class="result-card">
                <h3>🏠 Amortizando</h3>

                <div class="result-item">
                    <span>Juros economizados</span>
                    <strong id="jurosEconomizados"></strong>
                </div>

                <div class="result-item">
                    <span>Dívida quitada</span>
                    <strong id="dividaQuitada"></strong>
                </div>

                <div class="result-item">
                    <span>Novo prazo estimado</span>
                    <strong id="novoPrazo"></strong>
                </div>

                <div class="result-item">
                    <span>Valor futuro do imóvel</span>
                    <strong id="imovelAmortizando"></strong>
                </div>

            </div>

        </div>

        <div class="best" id="melhorOpcao"></div>

        <div class="analysis" id="analysis"></div>

    </div>

</div>

<script>

function moeda(valor){
    return valor.toLocaleString('pt-BR',{
        style:'currency',
        currency:'BRL'
    });
}

function simular(){

    const valorImovel = Number(document.getElementById('valorImovel').value);
    const saldoDevedor = Number(document.getElementById('saldoDevedor').value);
    const parcelas = Number(document.getElementById('parcelas').value);
    const parcela = Number(document.getElementById('parcela').value);
    const jurosFinanciamento = Number(document.getElementById('jurosFinanciamento').value)/100;
    const aporte = Number(document.getElementById('aporte').value);
    const rentabilidade = Number(document.getElementById('rentabilidade').value)/100;
    const valorizacao = Number(document.getElementById('valorizacao').value)/100;
    const anos = Number(document.getElementById('anos').value);
    const sistema = document.getElementById('sistema').value;

    const meses = anos * 12;

    // =========================
    // INVESTIMENTO
    // =========================

    let montante = 0;

    const taxaMensalInvestimento = Math.pow(1 + rentabilidade,1/12)-1;

    for(let i=0;i<meses;i++){
        montante = (montante + aporte) * (1 + taxaMensalInvestimento);
    }

    const totalInvestido = aporte * meses;
    const jurosGanhos = montante - totalInvestido;

    // =========================
    // VALORIZAÇÃO DO IMÓVEL
    // =========================

    const valorFuturoImovel =
        valorImovel * Math.pow(1 + valorizacao,anos);

    // =========================
    // AMORTIZAÇÃO
    // =========================

    let saldo = saldoDevedor;
    let jurosPagosNormal = 0;
    let jurosPagosAmortizando = 0;

    const taxaMensalFinanciamento =
        Math.pow(1 + jurosFinanciamento,1/12)-1;

    let mesesQuitacao = 0;

    if(sistema === "PRICE"){

        let parcelaPrice =
            saldo *
            (
                taxaMensalFinanciamento /
                (1 - Math.pow(1+taxaMensalFinanciamento,-parcelas))
            );

        for(let i=0;i<parcelas;i++){

            let juros = saldo * taxaMensalFinanciamento;
            jurosPagosNormal += juros;

            saldo -= (parcelaPrice - juros);

        }

        saldo = saldoDevedor;

        while(saldo > 0){

            let juros = saldo * taxaMensalFinanciamento;

            jurosPagosAmortizando += juros;

            let amortizacao =
                (parcelaPrice + aporte) - juros;

            saldo -= amortizacao;

            mesesQuitacao++;

            if(mesesQuitacao > 1000) break;
        }

    }else{

        let amortizacaoConstante =
            saldoDevedor / parcelas;

        saldo = saldoDevedor;

        for(let i=0;i<parcelas;i++){

            let juros = saldo * taxaMensalFinanciamento;

            jurosPagosNormal += juros;

            saldo -= amortizacaoConstante;

        }

        saldo = saldoDevedor;

        while(saldo > 0){

            let amortizacaoMensal =
                (saldoDevedor/parcelas) + aporte;

            let juros = saldo * taxaMensalFinanciamento;

            jurosPagosAmortizando += juros;

            saldo -= amortizacaoMensal;

            mesesQuitacao++;

            if(mesesQuitacao > 1000) break;
        }

    }

    const jurosEconomizados =
        jurosPagosNormal - jurosPagosAmortizando;

    const anosQuitacao =
        Math.floor(mesesQuitacao/12);

    const mesesRestantes =
        mesesQuitacao % 12;

    // =========================
    // COMPARAÇÃO FINAL
    // =========================

    const patrimonioInvestir =
        valorFuturoImovel + montante;

    const patrimonioAmortizar =
        valorFuturoImovel + jurosEconomizados;

    let melhor = "";

    if(patrimonioInvestir > patrimonioAmortizar){

        melhor = `
            <h2>📈 Melhor Estratégia: INVESTIR</h2>
            <p>
                O investimento gerou maior crescimento patrimonial
                no período analisado.
            </p>
        `;

    }else{

        melhor = `
            <h2>🏠 Melhor Estratégia: AMORTIZAR</h2>
            <p>
                A economia de juros compensou mais do que investir.
            </p>
        `;
    }

    // =========================
    // ANÁLISE INTELIGENTE
    // =========================

    let analise = "";

    if(rentabilidade > jurosFinanciamento){

        analise += `
        • Sua rentabilidade anual está acima do custo do financiamento.<br><br>
        `;

    }else{

        analise += `
        • O financiamento possui juros altos em relação ao investimento.<br><br>
        `;
    }

    if(mesesQuitacao < parcelas){

        analise += `
        • A amortização reduziria significativamente o prazo do financiamento.<br><br>
        `;
    }

    if(jurosEconomizados > jurosGanhos){

        analise += `
        • A economia de juros foi maior que o rendimento do investimento.<br><br>
        `;
    }else{

        analise += `
        • Os juros compostos superaram a economia obtida na amortização.<br><br>
        `;
    }

    // =========================
    // EXIBIÇÃO
    // =========================

    document.getElementById('results').style.display='block';

    document.getElementById('totalInvestido').innerHTML =
        moeda(totalInvestido);

    document.getElementById('jurosGanhos').innerHTML =
        moeda(jurosGanhos);

    document.getElementById('patrimonioInvestido').innerHTML =
        moeda(montante);

    document.getElementById('imovelInvestindo').innerHTML =
        moeda(valorFuturoImovel);

    document.getElementById('jurosEconomizados').innerHTML =
        moeda(jurosEconomizados);

    document.getElementById('dividaQuitada').innerHTML =
        moeda(saldoDevedor);

    document.getElementById('novoPrazo').innerHTML =
        `${anosQuitacao} anos e ${mesesRestantes} meses`;

    document.getElementById('imovelAmortizando').innerHTML =
        moeda(valorFuturoImovel);

    document.getElementById('melhorOpcao').innerHTML =
        melhor;

    document.getElementById('analysis').innerHTML =
        analise;

}

</script>

</body>
</html>
